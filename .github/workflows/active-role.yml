name: Active Role

on:
  schedule:
    # GitHub Actions cron uses UTC. This runs at 00:00 JST.
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: active-role
  cancel-in-progress: false

jobs:
  assign-active-role:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14 --quiet

      - name: Install dependencies
        run: uv sync --locked --no-dev --quiet

      - name: Assign active role
        run: uv run --quiet python main.py
